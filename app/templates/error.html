{% extends "base.html" %}
{% block title %}Erro {{ status }}{% endblock %}
{% block head %}
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
  <style>
    .error-page { min-height: 100vh; display: grid; place-items: center; padding: 24px; }
    .error-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); box-shadow: var(--shadow);
      padding: 40px 44px; text-align: center; max-width: 420px;
    }
    .error-code { margin: 0; font-size: 56px; font-weight: 800; color: var(--accent); letter-spacing: -.03em; }
    .error-msg { margin: 8px 0 24px; color: var(--muted); font-size: 15px; }
  </style>
{% endblock %}
{% block content %}
  <main class="error-page">
    <div class="error-card">
      <p class="error-code">{{ status }}</p>
      <p class="error-msg">{{ mensagem }}</p>
      <a class="btn btn-ghost" href="{{ url_for('agenda.agenda') }}">Voltar para a agenda</a>
    </div>
  </main>
{% endblock %}
